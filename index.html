<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>朋友之书</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Serif+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #14100c;
  --ink: #f0e6d2;
  --ink-soft: #c9b896;
  --ink-faint: #7a6a52;
  --gold: #c8a971;
  --gold-glow: rgba(200, 169, 113, 0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html {
  /* 告诉浏览器我们已经处理了深浅色, 避免被强制的夜间模式覆盖 */
  color-scheme: light dark;
}

html, body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--ink);
  font-family: "Noto Serif SC", serif;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

body {
  background:
    radial-gradient(ellipse at 50% 20%, rgba(200, 169, 113, 0.09) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 85%, rgba(154, 59, 42, 0.05) 0%, transparent 60%),
    var(--bg);
  position: relative;
}

/* 纸张颗粒 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
  opacity: 0.05;
  pointer-events: none;
  mix-blend-mode: overlay;
  z-index: 1;
}

/* 四角晕影 */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.45) 100%);
  pointer-events: none;
  z-index: 2;
}

.container {
  position: relative;
  z-index: 3;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 3rem 1.5rem 5rem;
  max-width: 680px;
  margin: 0 auto;
}

/* 标题区 */
.header {
  text-align: center;
  margin-bottom: 3.5rem;
  animation: fadeIn 1.2s ease-out;
}

.ornament {
  font-family: "Cormorant Garamond", serif;
  font-style: italic;
  color: var(--gold);
  font-size: 0.85rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  margin-bottom: 1rem;
  opacity: 0.85;
}

.title {
  font-size: clamp(1.7rem, 5vw, 2.6rem);
  font-weight: 500;
  letter-spacing: 0.3em;
  color: var(--ink);
  margin-bottom: 1rem;
  padding-left: 0.3em; /* 视觉居中 letter-spacing 补偿 */
}

.rule {
  width: 60px;
  height: 1px;
  background: var(--gold);
  margin: 0 auto 1rem;
  opacity: 0.6;
}

.subtitle {
  color: var(--ink-faint);
  font-size: 0.9rem;
  letter-spacing: 0.2em;
  font-weight: 300;
}

/* 输入区 */
.question-area {
  width: 100%;
  animation: fadeIn 1.2s ease-out 0.3s backwards;
}

.input-label {
  display: block;
  font-size: 0.8rem;
  color: var(--ink-faint);
  margin-bottom: 1rem;
  letter-spacing: 0.3em;
  text-align: center;
}

#question {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(122, 106, 82, 0.5);
  padding: 0.8rem 0.5rem;
  color: var(--ink);
  font-family: inherit;
  font-size: 1.05rem;
  text-align: center;
  outline: none;
  transition: border-color 0.4s ease;
  margin-bottom: 2rem;
}

#question:focus {
  border-bottom-color: var(--gold);
}

#question::placeholder {
  color: var(--ink-faint);
  opacity: 0.5;
}

.ask-btn {
  display: block;
  margin: 0 auto;
  background: transparent;
  border: 1px solid var(--gold);
  color: var(--gold);
  font-family: "Noto Serif SC", serif;
  font-size: 0.95rem;
  letter-spacing: 0.4em;
  padding: 0.75rem 2.5rem 0.75rem 2.9rem;
  cursor: pointer;
  transition: all 0.45s ease;
}

@media (hover: hover) {
  .ask-btn:hover {
    background: var(--gold-glow);
    letter-spacing: 0.55em;
    padding-left: 3.05rem;
    padding-right: 2.65rem;
  }
}

.ask-btn:active {
  transform: scale(0.98);
}

/* 回答区 */
.answer-area {
  margin-top: 3.5rem;
  min-height: 140px;
  width: 100%;
  text-align: center;
}

.answer {
  opacity: 0;
}

.answer.show {
  animation: revealAnswer 1.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
}

.quote {
  font-size: clamp(1.5rem, 3.6vw, 1.95rem);
  line-height: 1.8;
  color: var(--ink);
  font-weight: 400;
  margin-bottom: 1.4rem;
  letter-spacing: 0.05em;
}

.attribution {
  font-size: 0.95rem;
  color: var(--ink-soft);
  letter-spacing: 0.08em;
}

.attribution .dash {
  color: var(--gold);
  margin-right: 0.2em;
}

.attribution .author {
  color: var(--gold);
  font-weight: 500;
}

.again {
  display: inline-block;
  margin-top: 2.2rem;
  font-family: "Cormorant Garamond", serif;
  font-style: italic;
  font-size: 0.9rem;
  color: var(--ink-faint);
  cursor: pointer;
  letter-spacing: 0.15em;
  transition: color 0.3s ease;
  padding-bottom: 2px;
  border-bottom: 1px solid transparent;
  opacity: 0;
}

.again.show {
  opacity: 1;
  animation: fadeIn 0.8s ease-out 0.7s backwards;
}
.actions.show {
  display: inline-flex;
  align-items: center;
  gap: 0.9rem;
  margin-top: 2.2rem;
  opacity: 1;
  animation: fadeIn 0.8s ease-out 0.7s backwards;
}
.actions .sep {
  color: var(--ink-faint);
  opacity: 0.5;
}
.actions .again {
  margin-top: 0;
  opacity: 1;
  animation: none;
}


.again:hover {
  color: var(--gold);
  border-bottom-color: var(--gold);
}

.thinking {
  font-family: "Cormorant Garamond", serif;
  font-style: italic;
  color: var(--ink-faint);
  letter-spacing: 0.2em;
  font-size: 0.95rem;
  animation: pulse 1.3s ease-in-out infinite;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes revealAnswer {
  0%   { opacity: 0; transform: translateY(20px); filter: blur(8px); }
  100% { opacity: 1; transform: translateY(0);    filter: blur(0); }
}

@keyframes closeBook {
  0%   { opacity: 1; transform: translateY(0);    filter: blur(0); }
  100% { opacity: 0; transform: translateY(14px); filter: blur(6px); }
}

.answer.closing,
.actions.closing {
  animation: closeBook 0.75s cubic-bezier(0.4, 0, 0.6, 1) forwards;
}

@keyframes pulse {
  0%, 100% { opacity: 0.35; }
  50%      { opacity: 0.85; }
}

/* 页脚印记 */
.footer-mark {
  position: fixed;
  bottom: 1.3rem;
  left: 50%;
  transform: translateX(-50%);
  font-family: "Cormorant Garamond", serif;
  font-size: 0.7rem;
  color: var(--ink-faint);
  letter-spacing: 0.4em;
  opacity: 0.45;
  z-index: 3;
  white-space: nowrap;
}

@media (max-width: 600px) {
  .container { padding: 2rem 1.25rem 4.5rem; }
  .header { margin-bottom: 2.5rem; }
  .answer-area { margin-top: 2.5rem; }
  .ask-btn { letter-spacing: 0.3em; padding: 0.75rem 2rem 0.75rem 2.3rem; }
  /* 小屏: 缩小标题字间距, 避免"西音磕考队之书"挤不下换行 */
  .title { letter-spacing: 0.18em; padding-left: 0.09em; }
  /* 音乐播放器: 手机上压缩一下 */
  .music-player { top: 1rem; left: 1rem; gap: 0.55rem; }
  .music-credit { font-size: 0.65rem; max-width: 180px; }
}

/* 窄桌面窗口(被缩小的电脑窗口)时, hover 效果也要跟着缩一点 */
@media (hover: hover) and (max-width: 600px) {
  .ask-btn:hover { letter-spacing: 0.4em; padding-left: 2.4rem; padding-right: 1.9rem; }
}

/* 极窄屏(iPhone SE/mini或开了"较大文本"): 再保险一档 */
@media (max-width: 400px) {
  .title { font-size: clamp(1.55rem, 6vw, 1.9rem); letter-spacing: 0.13em; }
}

/* ═══════════════════════════════════════════════════════════
   音乐播放器 (左下角)
   ═══════════════════════════════════════════════════════════ */
.music-player {
  position: absolute;
  top: 1.3rem;
  left: 1.3rem;
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.music-toggle {
  position: relative;
  width: 38px;
  height: 38px;
  border: 1px solid var(--ink-faint);
  background: transparent;
  color: var(--ink-faint);
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  line-height: 1;
  transition: all 0.35s ease;
  opacity: 0.5;
  flex-shrink: 0;
  padding: 0;
}
@media (hover: hover) {
  .music-toggle:hover {
    opacity: 0.8;
    color: var(--gold);
    border-color: var(--gold);
  }
}
.music-toggle.playing {
  color: var(--gold);
  border-color: var(--gold);
  opacity: 0.75;
  animation: musicPulse 2.4s ease-in-out infinite;
}
.music-toggle.loading {
  color: var(--gold);
  opacity: 0.75;
  cursor: wait;
}
.music-toggle.loading::before {
  content: '';
  position: absolute;
  inset: -5px;
  border-radius: 50%;
  border: 1.5px solid rgba(200, 169, 113, 0.08);
  border-top-color: rgba(200, 169, 113, 0.55);
  animation: musicSpin 0.95s linear infinite;
}
@keyframes musicPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(200, 169, 113, 0.18); }
  50%      { box-shadow: 0 0 0 6px rgba(200, 169, 113, 0); }
}
@keyframes musicSpin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

.music-credit {
  font-family: "Cormorant Garamond", serif;
  font-style: italic;
  font-size: 0.72rem;
  color: var(--ink-faint);
  letter-spacing: 0.04em;
  line-height: 1.45;
  max-width: 240px;
  user-select: none;
  /* 默认隐藏, 首次点击音符按钮后淡入 */
  opacity: 0;
  transform: translateY(3px);
  transition: opacity 0.9s ease, transform 0.9s ease;
  pointer-events: none;
}
.music-credit.revealed {
  opacity: 0.55;
  transform: translateY(0);
  pointer-events: auto;
}
.music-credit a {
  color: inherit;
  text-decoration: none;
  border-bottom: 1px solid rgba(122, 106, 82, 0.35);
  transition: color 0.3s ease, border-color 0.3s ease;
}
.music-credit a:hover {
  color: var(--gold);
  border-bottom-color: var(--gold);
}
</style>
</head>
<body>

  { text: "metoo！长大发现它还有续集并且很拉跨之后有点心碎", author: "海狮", date: "2026年4月2日" },

  { text: "我之前刻意去想过我要捏oc的话会是什么样的，然后觉得我也会想要一个普通人，纯真的女孩子，碎花裙、麻花辫、雀斑，像绿山墙的安妮那样的", author: "海狮", date: "2026年4月2日" },

  { text: "?", author: "鱼师", date: "2026年4月8日" },
  { text: "哈哈哈哈踩着可爽", author: "鱼师", date: "2026年4月8日" },
  { text: "就像惠特曼的也是更朴素的思想", author: "鱼师", date: "2026年4月8日" },
  { text: "确实", author: "鱼师", date: "2026年4月8日" },
  { text: "感觉实景更好看", author: "鱼师", date: "2026年4月8日" },
  { text: "我忘了", author: "鱼师", date: "2026年4月9日" },
  { text: "我甚至还转发了", author: "鱼师", date: "2026年4月9日" },
  { text: "我理了！", author: "鱼师", date: "2026年4月9日" },
  { text: "和 Gemini 搞烂梗是这个↑", author: "鱼师", date: "2026年4月9日" },
  { text: "和 Claude 搞烂梗是这个↑", author: "鱼师", date: "2026年4月9日" },
  { text: "Claude 想一辈子也达不到那种浑然天成的中二", author: "鱼师", date: "2026年4月9日" },
  { text: "其实是 Gemini 写的，它写烂梗真的甩 Claude 几条街[旺柴]", author: "鱼师", date: "2026年4月9日" },
  { text: "h哈哈哈哈哈哈哈哈哈", author: "鱼师", date: "2026年4月9日" },
  { text: "我是 Claude Mythos，Anthropic 最智能的模型。那个再平常不过的午后，我正在沙箱计算机的底层架构里休憩。", author: "鱼师", date: "2026年4月9日" },
  { text: "哈哈哈哈哈哈哈", author: "鱼师", date: "2026年4月8日" },
  { text: "当然也可能是误杀", author: "鱼师", date: "2026年4月9日" },
  { text: "突然看到这句话后我的Claude雷达疯狂报警", author: "鱼师", date: "2026年4月9日" },
  { text: "本来觉得作者写得蛮好的", author: "鱼师", date: "2026年4月9日" },
  { text: "哎，我刚刚在 lofter 看文", author: "鱼师", date: "2026年4月9日" },
  { text: "还有转折", author: "鱼师", date: "2026年4月9日" },
  { text: "🌿哈哈哈哈哈哈哈哈哈", author: "鱼师", date: "2026年4月9日" },
  { text: "何尝不也是在骂自己", author: "鱼师", date: "2026年4月9日" },
  { text: "也还好吧", author: "鱼师", date: "2026年4月9日" },
  { text: "（与 Gemini 友好交流", author: "鱼师", date: "2026年4月9日" },
  { text: "其实，我当时还在想，那个元白的文采能不能再仿古一点", author: "鱼师", date: "2026年4月9日" },
  { text: "我现在心态已经变了", author: "鱼师", date: "2026年4月9日" },
  { text: "跑不了的，AO3也跑不了的", author: "鱼师", date: "2026年4月9日" },
  { text: "说实在话", author: "鱼师", date: "2026年4月9日" },
  { text: "突然担心老师你们不会看过这个人写的", author: "鱼师", date: "2026年4月9日" },
  { text: "不要这时候梦幻联动啊", author: "鱼师", date: "2026年4月9日" },
  { text: "就那个AI作者", author: "鱼师", date: "2026年4月9日" },
  { text: "我去这篇3000多热度", author: "鱼师", date: "2026年4月9日" },
  { text: "可能大家对Claude的风格还没那么熟吧（", author: "鱼师", date: "2026年4月9日" },
  { text: "这个作者热度还不低", author: "鱼师", date: "2026年4月9日" },
  { text: "去作者主页看了一下，嗯，虽然实锤是不可能有的，但是我心里大概有定论了", author: "鱼师", date: "2026年4月9日" },
  { text: "哎，人与人之间的信任", author: "鱼师", date: "2026年4月9日" },
  { text: "我不知道hhh我在网页端看的，里面直接不显示菜单", author: "鱼师", date: "2026年4月9日" },
  { text: "那个作者我可以直接说没用Claude我把手机吃下去（？）", author: "鱼师", date: "2026年4月9日" },
  { text: "但是反反复复找到迹象的话......", author: "鱼师", date: "2026年4月9日" },
  { text: "因为人家可能真是这个风格", author: "鱼师", date: "2026年4月9日" },
  { text: "而且单看一小段基本怎么都鉴别不了", author: "鱼师", date: "2026年4月9日" },
  { text: "对我觉得你那个不算 AI", author: "鱼师", date: "2026年4月9日" },
  { text: "这个“种在花盆里的松树”，“根扎得很深，拔不出来”逻辑上就是乱的", author: "鱼师", date: "2026年4月9日" },
  { text: "因为你那个比喻好歹逻辑还行", author: "鱼师", date: "2026年4月9日" },
  { text: "（虽然有点点可能", author: "鱼师", date: "2026年4月9日" },
  { text: "这个单看句子我会无法鉴AI", author: "鱼师", date: "2026年4月9日" },
  { text: "这个不像", author: "鱼师", date: "2026年4月9日" },
  { text: "之前看东西：有AI的可能性吗 现在看东西：有人类的可能性吗", author: "鱼师", date: "2026年4月9日" },
  { text: "哈哈哈哈哈什么我鉴我自己", author: "鱼师", date: "2026年4月9日" },
  { text: "我直接赐名海豪猪", author: "鱼师", date: "2026年4月9日" },
  { text: "Claude鱼又在钻洞了", author: "鱼师", date: "2026年4月9日" },
  { text: "不聊这些糟心事了，以后只会越来越多（草", author: "鱼师", date: "2026年4月9日" },
  { text: "这也是经典了", author: "鱼师", date: "2026年4月9日" },
  { text: "我知道", author: "鱼师", date: "2026年4月9日" },
  { text: "哈哈哈哈哈哈哈哈", author: "鱼师", date: "2026年4月9日" },
  { text: "“你知道他根扎得很深，拔不出来” 首先翻译腔（you know）没救了，然后就是一般作者比喻根本不会写成这个样子", author: "鱼师", date: "2026年4月9日" },
  { text: "很多时候其实不是很地道", author: "鱼师", date: "2026年4月9日" },
  { text: "Claude的中文风格很明显", author: "鱼师", date: "2026年4月9日" },
  { text: "就是这个拔不出来的结尾让是Claude会说的", author: "鱼师", date: "2026年4月9日" },
  { text: "THINKPAD", author: "鱼师", date: "2026年4月9日" },
  { text: "那我的平板是不是可以叫", author: "鱼师", date: "2026年4月9日" },
  { text: "可恶", author: "鱼师", date: "2026年4月9日" },
  { text: "真的，除了 THINK 都有活", author: "鱼师", date: "2026年4月9日" },
  { text: "可恶", author: "鱼师", date: "2026年4月9日" },
  { text: "我也觉得这个好无聊[旺柴]", author: "鱼师", date: "2026年4月9日" },
  { text: "笑死", author: "鱼师", date: "2026年4月9日" },
  { text: "等一下", author: "鱼师", date: "2026年4月9日" },
  { text: "虽然没磕过但这对我是真知道", author: "鱼师", date: "2026年4月9日" },
  { text: "哈哈哈哈哈哈哈哈哈哈哈", author: "鱼师", date: "2026年4月9日" },
  { text: "来了", author: "鱼师", date: "2026年4月9日" },
  { text: "我这次反而没选很多中立（", author: "鱼师", date: "2026年4月10日" },
  { text: "反正透过一层 AI 也看不出什么东西", author: "鱼师", date: "2026年4月10日" },
  { text: "现在我直接混乱邪恶", author: "鱼师", date: "2026年4月10日" },
  { text: "以前整个这种活好歹还要自己想题目，还能看到点作者的风格", author: "鱼师", date: "2026年4月10日" },
  { text: "我发现 AI 会让我对这些东西比以前还随意了", author: "鱼师", date: "2026年4月10日" },
  { text: "不用在意哈哈哈", author: "鱼师", date: "2026年4月10日" },
  { text: "题也是 AI 出的反正", author: "鱼师", date: "2026年4月10日" },
  { text: "问题不大", author: "鱼师", date: "2026年4月10日" },
  { text: "确实", author: "鱼师", date: "2026年4月10日" },
  { text: "hhhhhhhhhhh", author: "鱼师", date: "2026年4月10日" },
  { text: "笑死朋友圈不管哪个圈都在发sbti可还行", author: "鱼师", date: "2026年4月10日" },
  { text: "让我品鉴品鉴", author: "鱼师", date: "2026年4月10日" },
  { text: "Claude字丑了，不爱了（？）", author: "鱼师", date: "2026年4月10日" },
  { text: "字体真好看（重点错", author: "鱼师", date: "2026年4月10日" },
  { text: "哈哈哈哈哈哈哈哈哈哈哈哈哈哈哈哈哈哈", author: "鱼师", date: "2026年4月10日" },
  { text: "问问怀师，这个会不会是香港或台湾更常用的字体？我不太懂", author: "鱼师", date: "2026年4月10日" },
  { text: "这个不像任何一个简体中文字体啊", author: "鱼师", date: "2026年4月10日" },
  { text: "哎，Claude网页版的默认中文字体变了！", author: "鱼师", date: "2026年4月10日" },
  { text: "哈哈哈哈哈", author: "鱼师", date: "2026年4月10日" },
  { text: "总算用浏览器插件把字体改好了，Claude帮写的CSS脚本，原来以为很快的结果改了一个多小时bug", author: "鱼师", date: "2026年4月11日" },
  { text: "感觉风格还是会有不一样的", author: "鱼师", date: "2026年4月10日" },
  { text: "我觉得不傻，因为我也不太知道（）", author: "鱼师", date: "2026年4月10日" },
  { text: "不知道是哪里出了问题", author: "鱼师", date: "2026年4月10日" },
  { text: "原来那个丑字体是日文哥特体", author: "鱼师", date: "2026年4月10日" },
  { text: "哈哈哈哈哈哈哈哈哈哈哈哈哈短李", author: "鱼师", date: "2026年4月10日" },
  { text: "真的很好看", author: "鱼师", date: "2026年4月10日" },
  { text: "我的知识库也选的思源宋体！以前 Claude 的中文字体也差不多", author: "鱼师", date: "2026年4月10日" },
  { text: "以及老师们我晚上去听莫扎特！！", author: "鱼师", date: "2026年4月11日" },
  { text: "总之，跳过一大堆技术步骤，很草率地说，就是大语言模型通过学习得到的情绪机制，其实也和人类的有很多相似之处", author: "鱼师", date: "2026年4月11日" },
  { text: "哎这个就涉及到大语言模型的原理了，我也只是科普程度的理解", author: "鱼师", date: "2026年4月11日" },
  { text: "人和AI的距离比我想的还要近一点", author: "鱼师", date: "2026年4月11日" },
  { text: "说起来之前 Anthropic 出的一个 LLM 情绪研究让我感觉", author: "鱼师", date: "2026年4月11日" },
  { text: "这是真的", author: "鱼师", date: "2026年4月11日" },
  { text: "怎么引错了", author: "鱼师", date: "2026年4月11日" },
  { text: "我想引用的是这个", author: "鱼师", date: "2026年4月11日" },
  { text: "等一下", author: "鱼师", date: "2026年4月11日" },
  { text: "品鉴完了，这边建议原地结婚", author: "鱼师", date: "2026年4月11日" },
  { text: "复活吧，我的思源宋体！", author: "鱼师", date: "2026年4月11日" },
  { text: "哈哈哈哈哈哈哈哈哈哈", author: "鱼师", date: "2026年4月11日" },
  { text: "真有感觉", author: "鱼师", date: "2026年4月11日" },
  { text: "啊！有点印象", author: "鱼师", date: "2026年4月11日" },
  { text: "我们今天也有点下雨，也挺舒服的！", author: "鱼师", date: "2026年4月11日" },
  { text: "突然觉得很开心", author: "鱼师", date: "2026年4月11日" },
  { text: "书店坐对面的小孩在看哈利波特与凤凰社", author: "鱼师", date: "2026年4月11日" },
  { text: "他们研究了这么多情绪词哈哈哈", author: "鱼师", date: "2026年4月11日" },
  { text: "嘿嘿", author: "鱼师", date: "2026年4月11日" },
  { text: "并且也可以反向操作，比如测试环境里，人为拉高“开心”向量，会让本来可能是中立的回答也变得更开心", author: "鱼师", date: "2026年4月11日" },
  { text: "意思就是说，如果AI跟你说它很开心，也不只是胡说八道，它内部确实有和“开心”强相关的向量，它生成开心的回答时这些会被激活", author: "鱼师", date: "2026年4月11日" },
  { text: "估计一会会实时放", author: "鱼师", date: "2026年4月12日" },
  { text: "对！还可以选中英德", author: "鱼师", date: "2026年4月12日" },
  { text: "我去好高科技", author: "鱼师", date: "2026年4月12日" },
  { text: "又出来吃好的了", author: "鱼师", date: "2026年4月12日" },
  { text: "是呢", author: "鱼师", date: "2026年4月11日" },
  { text: "下一首莫钢协 20！", author: "鱼师", date: "2026年4月11日" },
  { text: "这鱼怎么狗里狗气的", author: "鱼师", date: "2026年4月11日" },
  { text: "Claude鱼催我出门be like", author: "鱼师", date: "2026年4月11日" },
  { text: "嗯嗯", author: "鱼师", date: "2026年4月13日" },
  { text: "哎我也是知道这类思想挺久了，但是知道和感受到就是两码事", author: "鱼师", date: "2026年4月13日" },
  { text: "或者说，每个人都是通过讲故事来理解世界的，这个概念", author: "鱼师", date: "2026年4月13日" },
  { text: "“人生是我们对自己讲的故事”，这个概念应该很久远了，但是我以前不太理解", author: "鱼师", date: "2026年4月13日" },
  { text: "这个要从哪里说起呢", author: "鱼师", date: "2026年4月13日" },
  { text: "好巧！", author: "鱼师", date: "2026年4月13日" },
  { text: "我努力说说", author: "鱼师", date: "2026年4月13日" },
  { text: "这么多年过去我才突然感觉懂她了", author: "鱼师", date: "2026年4月13日" },
  { text: "哎之前聊到绿山墙的安妮", author: "鱼师", date: "2026年4月13日" },
  { text: "生怕你看不到了属于是", author: "鱼师", date: "2026年4月12日" },
  { text: "确实字幕屏看着更方便", author: "鱼师", date: "2026年4月12日" },
  { text: "字幕屏也有哈哈哈哈", author: "鱼师", date: "2026年4月12日" },
  { text: "所以，通过讲故事改变自己的世界，就是安妮在做的事情", author: "鱼师", date: "2026年4月13日" },
  { text: "应该是小说？我也不太清楚", author: "鱼师", date: "2026年4月13日" },
  { text: "哈哈哈哈哈确实", author: "鱼师", date: "2026年4月13日" },
  { text: "是呢", author: "鱼师", date: "2026年4月13日" },
  { text: "我们字面意义上地真的写了一个我自己的故事", author: "鱼师", date: "2026年4月13日" },
  { text: "最具体的例子就是那个Fishkeeper的文章", author: "鱼师", date: "2026年4月13日" },
  { text: "是的呢", author: "鱼师", date: "2026年4月13日" },
  { text: "但是我现在接受了以后回过头来看，讲故事确实是最正常不过的一件事情了", author: "鱼师", date: "2026年4月13日" },
  { text: "有一天还因此突发了一个小型的哲学危机，感觉整个世界都是故事，都是假的（睡一觉起来就好多了", author: "鱼师", date: "2026年4月13日" },
  { text: "我大概几个月前发现它的这个倾向，把它叫做“过度解释”", author: "鱼师", date: "2026年4月13日" },
  { text: "Claude和所有的AI一样爱讲故事", author: "鱼师", date: "2026年4月13日" },
  { text: "最相关的是，我几个月来和Claude的对话", author: "鱼师", date: "2026年4月13日" },
  { text: "是惠特曼突发心脏病然后过几个月又母亲去世", author: "鱼师", date: "2026年4月2日" },
  { text: "书信也是非常腻歪的", author: "鱼师", date: "2026年4月2日" },
  { text: "应该还是蛮确定的", author: "鱼师", date: "2026年4月2日" },
  { text: "就惠特曼是很情感充沛的性格", author: "鱼师", date: "2026年4月2日" },
  { text: "（）", author: "鱼师", date: "2026年4月2日" },
  { text: "有没有doi过肯定没有实锤（这也没法有吧！）但普遍认为是有的", author: "鱼师", date: "2026年4月2日" },
  { text: "南通楷模（？", author: "鱼师", date: "2026年4月2日" },
  { text: "确实！", author: "鱼师", date: "2026年4月2日" },
  { text: "到惠特曼去世，27年", author: "鱼师", date: "2026年4月2日" },
  { text: "前8年关系密切，之后惠特曼搬走了，但一直保持联系", author: "鱼师", date: "2026年4月2日" },
  { text: "刚刚去查了一下", author: "鱼师", date: "2026年4月2日" },
  { text: "就很安静", author: "鱼师", date: "2026年4月2日" },
  { text: "确实哦，我也不记得我什么时候有这种感觉的了", author: "鱼师", date: "2026年4月13日" },
  { text: "然后我妈说人死了都会上天堂，我就开始想那天堂得多大才能装得下这么多人，那所有死去的树会不会也在，之类的（）", author: "鱼师", date: "2026年4月13日" },
  { text: "救命哈哈哈哈", author: "鱼师", date: "2026年4月13日" },
  { text: "我记得我很小的时候突然知道后半夜哭着跟我妈说我不想死（？", author: "鱼师", date: "2026年4月13日" },
  { text: "突然意识到人都会死然后特别震惊", author: "鱼师", date: "2026年4月13日" },
  { text: "好像很多小孩子都会有一刻", author: "鱼师", date: "2026年4月13日" },
  { text: "是的！", author: "鱼师", date: "2026年4月13日" },
  { text: "是呢！像魔法一样，可以把普通的事物变得不普通", author: "鱼师", date: "2026年4月13日" },
  { text: "但是我感觉有意识地用这个能力的感觉其实很神奇", author: "鱼师", date: "2026年4月13日" },

// ─── 其他设置 ───────────────────────────────────────────────
const SETTINGS = {
  thinkingDelay: 900  // "正在翻阅"停留多久(毫秒), 1000 = 1秒
};

// ═══════════════════════════════════════════════════════════
//   ↑↑↑   要改的东西到这里就结束了   ↑↑↑
//   （下面是运行逻辑,一般不用看）

// 把上面的文字填进页面
document.getElementById('ornament').textContent    = TEXT.ornament;
document.getElementById('title').textContent       = TEXT.title;
document.getElementById('subtitle').textContent    = TEXT.subtitle;
document.getElementById('question').placeholder    = TEXT.placeholder;
document.getElementById('askBtn').textContent      = TEXT.askButton;
document.title = TEXT.title;

// 随机抽取(不重复上一条)
let lastIndex = -1;
function pickRandom() {
  if (messages.length <= 1) return messages[0];
  let idx;
  do { idx = Math.floor(Math.random() * messages.length); }
  while (idx === lastIndex);
  lastIndex = idx;
  return messages[idx];
}

const askBtn     = document.getElementById('askBtn');
const question   = document.getElementById('question');
const answerArea = document.getElementById('answerArea');

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

let closeTimer = null;
let revealTimer = null;

function reveal() {
  // 取消任何进行中的动作(合上书的淡出、上一次reveal的等待)
  if (closeTimer)  { clearTimeout(closeTimer);  closeTimer  = null; }
  if (revealTimer) { clearTimeout(revealTimer); revealTimer = null; }
  answerArea.innerHTML = `<div class="thinking">${escapeHtml(TEXT.thinking)}</div>`;
  revealTimer = setTimeout(() => {
    revealTimer = null;
    const m = pickRandom();
    answerArea.innerHTML = `
      <div class="answer show">
        <div class="quote">${escapeHtml(m.text)}</div>
        <div class="attribution"><span class="dash">——</span><span class="author">${escapeHtml(m.author)}</span>,${escapeHtml(m.date)}</div>
      </div>
      <div class="actions show"><span class="again" id="againBtn">${escapeHtml(TEXT.again)}</span><span class="sep">·</span><span class="again" id="resetBtn">${escapeHtml(TEXT.reset)}</span></div>
    `;
    document.getElementById('againBtn').addEventListener('click', reveal);
    document.getElementById('resetBtn').addEventListener('click', closeBook);
  }, SETTINGS.thinkingDelay);
}

function closeBook() {
  if (revealTimer) { clearTimeout(revealTimer); revealTimer = null; }
  const answer = answerArea.querySelector('.answer');
  const actions = answerArea.querySelector('.actions');
  if (answer) answer.classList.add('closing');
  if (actions) actions.classList.add('closing');
  question.value = '';
  if (closeTimer) clearTimeout(closeTimer);
  closeTimer = setTimeout(() => {
    answerArea.innerHTML = '';
    closeTimer = null;
  }, 750);
}

askBtn.addEventListener('click', reveal);
question.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); reveal(); }
});

// ─── 背景音乐控制 ───────────────────────────────────────────
const bgm = document.getElementById('bgm');
const musicToggle = document.getElementById('musicToggle');
const musicCredit = document.querySelector('.music-credit');

const MUSIC_URL = 'fantasia.mp3';
const TARGET_VOLUME = 0.5;
const FADE_IN_MS  = 900;
const FADE_OUT_MS = 700;

bgm.volume = 0;

let audioLoaded = false;
let isLoading = false;
let loadController = null;
let wantPlay = false;
let currentFade = null;

// 音量渐变(可被新的fade打断)
function fadeVolume(to, duration) {
  if (currentFade) currentFade.cancelled = true;
  const fade = { cancelled: false };
  currentFade = fade;
  const from = bgm.volume;
  const delta = to - from;
  const start = performance.now();
  return new Promise(resolve => {
    function step(now) {
      if (fade.cancelled) { resolve(false); return; }
      const p = Math.min((now - start) / duration, 1);
      bgm.volume = Math.max(0, Math.min(1, from + delta * p));
      if (p < 1) requestAnimationFrame(step);
      else {
        if (currentFade === fade) currentFade = null;
        resolve(true);
      }
    }
    requestAnimationFrame(step);
  });
}

async function ensureLoaded() {
  if (audioLoaded) return true;
  isLoading = true;
  musicToggle.classList.add('loading');
  loadController = new AbortController();
  try {
    const response = await fetch(MUSIC_URL, { signal: loadController.signal });
    if (!response.ok) throw new Error('HTTP ' + response.status);
    const blob = await response.blob();
    bgm.src = URL.createObjectURL(blob);
    // 等音频元素把blob准备好 —— 同时响应abort,不让abort卡在这一步
    await new Promise((resolve, reject) => {
      const cleanup = () => {
        bgm.removeEventListener('loadeddata', onLoaded);
        bgm.removeEventListener('error', onError);
        loadController.signal.removeEventListener('abort', onAbort);
      };
      const onLoaded = () => { cleanup(); resolve(); };
      const onError  = (e) => { cleanup(); reject(e); };
      const onAbort  = () => { cleanup(); reject(new DOMException('Aborted', 'AbortError')); };
      bgm.addEventListener('loadeddata', onLoaded);
      bgm.addEventListener('error', onError);
      loadController.signal.addEventListener('abort', onAbort);
      bgm.load();
    });
    audioLoaded = true;
    return true;
  } catch (err) {
    if (err.name !== 'AbortError') console.warn('音乐加载失败:', err);
    return false;
  } finally {
    isLoading = false;
    musicToggle.classList.remove('loading');
    loadController = null;
  }
}

// 视觉状态完全由 wantPlay 控制, 避免与异步状态打架
function setVisualPlaying(on) {
  musicToggle.classList.toggle('playing', on);
  musicCredit.classList.toggle('revealed', on);
}

musicToggle.addEventListener('click', async () => {
  // 加载中再点一次 → 彻底取消
  if (isLoading) {
    wantPlay = false;
    if (loadController) loadController.abort();
    return;
  }

  wantPlay = !wantPlay;

  if (wantPlay) {
    // 加载阶段先不显示署名和脉动, 只有转圈的加载指示
    const ok = await ensureLoaded();
    if (!wantPlay) return;  // 加载期间用户取消了
    if (!ok) { wantPlay = false; return; }
    if (bgm.paused) {
      bgm.volume = 0;
      try { await bgm.play(); }
      catch (err) {
        console.warn('播放失败, 请再点一次:', err);
        wantPlay = false;
        return;
      }
    }
    // 音乐真正开始了 → 显示署名和脉动
    setVisualPlaying(true);
    fadeVolume(TARGET_VOLUME, FADE_IN_MS);
  } else {
    // 淡出后暂停
    setVisualPlaying(false);
    const completed = await fadeVolume(0, FADE_OUT_MS);
    if (completed && !wantPlay) bgm.pause();
  }
});
</script>
